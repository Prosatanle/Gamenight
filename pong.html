// Pre-render both faces
function makeOffscreen(grid, gw, gh) {
  const oc = document.createElement('canvas');
  oc.width=gw; oc.height=gh;
  const ox = oc.getContext('2d');
  ox.imageSmoothingEnabled=false;
  for(let r=0;r<gh;r++)
    for(let c=0;c<gw;c++){
      const col=grid[r]&&grid[r][c];
      if(!col)continue;
      ox.fillStyle=col;
      ox.fillRect(c,r,1,1);
    }
  return oc;
}

const face1=makeOffscreen(P1,P1_W,P1_H); // bald
const face2=makeOffscreen(P2,P2_W,P2_H); // brown hair

// ── Paddle sizes ──────────────────────────────────────────────────
const PAD_H=72; // rendered height
const PAD1_W=Math.round(PAD_H*(P1_W/P1_H)); // preserve ratio
const PAD2_W=Math.round(PAD_H*(P2_W/P2_H));
const PAD_SPEED=5;
const BALL_SIZE=12;
const WIN_SCORE=7;

// ── Game state ────────────────────────────────────────────────────
let p1y,p2y,ball,score1,score2,state,particles;
const keys={};

function reset(fullReset=true){
  p1y=H/2-PAD_H/2;
  p2y=H/2-PAD_H/2;
  if(fullReset){ score1=0; score2=0; }
  const angle=(Math.random()*0.8-0.4);
  const dir=Math.random()<0.5?1:-1;
  ball={
    x:W/2, y:H/2,
    vx:dir*4.5*Math.cos(angle),
    vy:4.5*Math.sin(angle)
  };
  particles=[];
  if(fullReset) state='waiting';
  else state='playing';
  s1El.textContent=score1;
  s2El.textContent=score2;
}

function spawnParticles(x,y,color){
  for(let i=0;i<12;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=2+Math.random()*4;
    particles.push({
      x,y,
      vx:Math.cos(angle)*speed,
      vy:Math.sin(angle)*speed,
      life:1, color
    });
  }
}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){
    e.preventDefault();
    if(state==='waiting'||state==='win') reset(true);
    else if(state==='paused') state='playing';
  }
});
document.addEventListener('keyup',e=>keys[e.code]=false);

// ── Drawing ───────────────────────────────────────────────────────
function drawBg(){
  ctx.fillStyle='#f4f2ee';
  ctx.fillRect(0,0,W,H);
  // Center line
  ctx.setLineDash([10,10]);
  ctx.strokeStyle='#ddd';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(W/2,0); ctx.lineTo(W/2,H);
  ctx.stroke();
  ctx.setLineDash([]);
}

function drawFace(img, gw, gh, x, y, dw, dh){
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(img, x, y, dw, dh);
}

function drawBall(){
  // Ball glow
  const grad=ctx.createRadialGradient(ball.x,ball.y,0,ball.x,ball.y,BALL_SIZE);
  grad.addColorStop(0,'#ff4d2e');
  grad.addColorStop(1,'rgba(255,77,46,0)');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,BALL_SIZE*1.5,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#ff4d2e';
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,BALL_SIZE/2,0,Math.PI*2);
  ctx.fill();
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;
    ctx.fillStyle=p.color;
    ctx.beginPath();
    ctx.arc(p.x,p.y,3,0,Math.PI*2);
    ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawScores(){
  ctx.textAlign='center';
  ctx.font='bold 48px monospace';
  ctx.fillStyle='rgba(0,0,0,0.08)';
  ctx.fillText(score1, W/4, 60);
  ctx.fillText(score2, 3*W/4, 60);
}

function drawOverlay(title,sub){
  ctx.fillStyle='rgba(0,0,0,0.6)';
  ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 36px monospace'; ctx.fillStyle='#FFD700';
  ctx.fillText(title,W/2,H/2-20);
  ctx.font='14px monospace'; ctx.fillStyle='#fff';
  ctx.fillText(sub,W/2,H/2+16);
}

// ── Update ────────────────────────────────────────────────────────
function update(){
  if(state!=='playing') return;

  // Paddle movement
  const p1cx=PAD1_W/2+6; // paddle center x offset
  const p2cx=PAD2_W/2+6;
  if(keys['KeyW']) p1y=Math.max(0,p1y-PAD_SPEED);
  if(keys['KeyS']) p1y=Math.min(H-PAD_H,p1y+PAD_SPEED);
  if(keys['ArrowUp']) p2y=Math.max(0,p2y-PAD_SPEED);
  if(keys['ArrowDown']) p2y=Math.min(H-PAD_H,p2y+PAD_SPEED);

  // Ball movement
  ball.x+=ball.vx;
  ball.y+=ball.vy;

  // Top/bottom bounce
  if(ball.y-BALL_SIZE/2<=0){ ball.y=BALL_SIZE/2; ball.vy=Math.abs(ball.vy); }
  if(ball.y+BALL_SIZE/2>=H){ ball.y=H-BALL_SIZE/2; ball.vy=-Math.abs(ball.vy); }

  // Paddle 1 (left) collision
  const p1right=PAD1_W+6;
  if(ball.vx<0 &&
     ball.x-BALL_SIZE/2<=p1right &&
     ball.x+BALL_SIZE/2>=6 &&
     ball.y>=p1y && ball.y<=p1y+PAD_H){
    ball.x=p1right+BALL_SIZE/2;
    const rel=(ball.y-(p1y+PAD_H/2))/(PAD_H/2);
    const angle=rel*0.9;
    const speed=Math.min(Math.sqrt(ball.vx**2+ball.vy**2)*1.05, 12);
    ball.vx=Math.abs(Math.cos(angle)*speed);
    ball.vy=Math.sin(angle)*speed;
    spawnParticles(ball.x,ball.y,'#0057ff');
  }

  // Paddle 2 (right) collision
  const p2left=W-PAD2_W-6;
  if(ball.vx>0 &&
     ball.x+BALL_SIZE/2>=p2left &&
     ball.x-BALL_SIZE/2<=W-6 &&
     ball.y>=p2y && ball.y<=p2y+PAD_H){
    ball.x=p2left-BALL_SIZE/2;
    const rel=(ball.y-(p2y+PAD_H/2))/(PAD_H/2);
    const angle=rel*0.9;
    const speed=Math.min(Math.sqrt(ball.vx**2+ball.vy**2)*1.05, 12);
    ball.vx=-Math.abs(Math.cos(angle)*speed);
    ball.vy=Math.sin(angle)*speed;
    spawnParticles(ball.x,ball.y,'#ff4d2e');
  }

  // Score
  if(ball.x<0){ score2++; spawnParticles(0,ball.y,'#ff4d2e'); checkWin()||reset(false); return; }
  if(ball.x>W){ score1++; spawnParticles(W,ball.y,'#0057ff'); checkWin()||reset(false); return; }

  // Particles
  particles.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.life-=0.04; p.vx*=0.95; p.vy*=0.95; });
  particles=particles.filter(p=>p.life>0);
}

function checkWin(){
  if(score1>=WIN_SCORE){ state='win'; s1El.textContent=score1; s2El.textContent=score2; return true; }
  if(score2>=WIN_SCORE){ state='win'; s1El.textContent=score1; s2El.textContent=score2; return true; }
  s1El.textContent=score1; s2El.textContent=score2;
  return false;
}

function loop(){
  drawBg();
  update();

  // Draw paddles as faces
  drawFace(face1,P1_W,P1_H, 6,p1y, PAD1_W,PAD_H);
  drawFace(face2,P2_W,P2_H, W-PAD2_W-6,p2y, PAD2_W,PAD_H);

  drawScores();
  drawBall();
  drawParticles();

  if(state==='waiting') drawOverlay('PROSA PONG','LEERTASTE zum Starten');
  else if(state==='win'){
    const winner=score1>=WIN_SCORE?'Spieler 1 🎉':'Spieler 2 🎉';
    drawOverlay(winner+' gewinnt!','LEERTASTE für Rematch');
  }

  requestAnimationFrame(loop);
}

reset(true);
loop();
setTimeout(()=>{document.getElementById('splash').style.display='none';},3000);
</script>
