<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prosa Invaders</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#0a0a1a;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:monospace;
    user-select:none;
  }
  #wrap { position:relative; }
  canvas {
    display:block;
    border-radius:14px;
    border:3px solid #222;
    image-rendering:pixelated;
    cursor:crosshair;
  }
  #ui {
    display:flex;
    gap:2rem;
    margin-top:.8rem;
    color:#555;
    font-size:13px;
  }
  #ui b { color:#FFD700; font-size:17px; }
  #hint { margin-top:.4rem; color:#444; font-size:11px; letter-spacing:.05em; }

  #splash {
    position:absolute; inset:0; border-radius:11px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    pointer-events:none; z-index:10;
    animation: splashFull 2.8s ease forwards;
  }
  @keyframes splashFull {
    0%   { background:rgba(0,0,0,0);    opacity:0; }
    14%  { background:rgba(0,0,30,0.95);opacity:1; }
    72%  { background:rgba(0,0,30,0.95);opacity:1; }
    100% { background:rgba(0,0,0,0);    opacity:0; }
  }
  #splash-title {
    font-size:40px; font-weight:bold; color:#00FFAA;
    letter-spacing:4px;
    opacity:0; transform:scale(0.4);
    text-shadow:0 0 24px rgba(0,255,170,0.7);
    animation:titlePop .55s cubic-bezier(0.34,1.56,0.64,1) .4s forwards;
  }
  @keyframes titlePop { to { opacity:1; transform:scale(1); } }
  #splash-sub {
    font-size:13px; color:#88aaaa; margin-top:14px;
    opacity:0; animation:subFade .4s ease 1.1s forwards;
  }
  @keyframes subFade { to { opacity:1; } }
  #back { margin-top:1rem; font-size:11px; color:#999; text-decoration:none; letter-spacing:.08em; text-transform:uppercase; }
  #back:hover { color:#FFD700; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="600" height="720"></canvas>
  <div id="splash">
    <div id="splash-title">PROSA INVADERS</div>
    <div id="splash-sub">← → Bewegen &nbsp;|&nbsp; LEERTASTE Schießen</div>
  </div>
</div>
<div id="ui">
  Punkte: <b id="sc">0</b> &nbsp;|&nbsp;
  Rekord: <b id="bs">0</b> &nbsp;|&nbsp;
  Leben: <b id="lv">❤❤❤</b> &nbsp;|&nbsp;
  Level: <b id="lv2">1</b>
</div>
<div id="hint">← → Bewegen &nbsp;|&nbsp; LEERTASTE oder KLICK zum Schießen</div>

// Pre-render city to offscreen canvas

  [N,'#2c1b15','#593b2e','#634434','#4b2f24','#311912','#2f1711',N,N,'#251712','#4a3229','#4e362c','#4d352b','#3c261f',N,N,'#371e16','#482c21','#41261c','#482a20','#492f26','#664d42','#6d4b3a','#4f3529','#120b09',N],
  [N,'#3f2a22','#5c3d2f','#533629','#3c2119','#331812','#28130e',N,N,N,N,N,N,N,N,'#180f0c','#44271e','#3a2119','#41261d','#4a2f23','#321911','#604132','#4f382c','#291914','#2a1b16','#170f0b'],
  ['#241713','#55382c','#533527','#482d23','#2d1813','#150a08',N,N,N,N,N,N,N,N,N,'#341f18','#3a2018','#452b23','#4d3126','#40271e','#3d231a','#5b3b2d','#352019','#20110d','#281a15',N],

  [N,N,N,'#110b0a',N,N,N,N,N,N,N,N,N,'#181210','#38221b','#351d14','#3b221a','#56392d','#4a3026','#41271d','#674939','#6a4e3f','#543a2f','#35211a',N,N],

shipOff.width=SHIP_W; shipOff.height=SHIP_H;
const sCtx=shipOff.getContext('2d');
sCtx.imageSmoothingEnabled=false;
for(let r=0;r<SHIP_H;r++)
  for(let c=0;c<SHIP_W;c++){
    const col=SHIP[r]&&SHIP[r][c];
    if(!col)continue;
    sCtx.fillStyle=col;
    sCtx.fillRect(c,r,1,1);
  }

// ── Tint offscreens per row for variety ──────────────────────────
// Row 0: blue-ish tint, Row 1: red tint, Row 2-4: default
function makeTintedCity(tint){
  const tc=document.createElement('canvas');
  tc.width=CITY_W; tc.height=CITY_H;
  const tx=tc.getContext('2d');
  tx.drawImage(cityOff,0,0);
  tx.globalCompositeOperation='multiply';
  tx.fillStyle=tint;
  tx.fillRect(0,0,CITY_W,CITY_H);
  tx.globalCompositeOperation='source-over';
  return tc;
}
const cityTints=[
  makeTintedCity('#aaddff'), // row0 – blue
  makeTintedCity('#ffaacc'), // row1 – pink
  makeTintedCity('#aaffcc'), // row2 – green
  makeTintedCity('#ffffaa'), // row3 – yellow
  makeTintedCity('#ddaaff'), // row4 – purple
];

// ── Game ──────────────────────────────────────────────────────────
const COLS=8, ROWS=5;
const ALIEN_H=48;
const ALIEN_W=Math.round(ALIEN_H*CITY_RATIO);
const CELL_W=68, CELL_H=64;
const SHIP_RENDER_H=64;
const SHIP_RENDER_W=Math.round(SHIP_RENDER_H*(SHIP_W/SHIP_H));
const SHIP_SPEED=5, BULLET_SPEED=9, ABSPEED=3.5;

let ship,aliens,bullets,aBullets,score,lives,level,state,moveDir,moveTimer,dropPending;
const keys={};

function initAliens(){
  aliens=[];
  const startX=W/2 - (COLS*CELL_W)/2 + CELL_W/2;
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      aliens.push({
        x:startX+c*CELL_W, y:80+r*CELL_H,
        col:c, row:r, alive:true,
        pts:(ROWS-r)*10,
        tint:r%cityTints.length
      });
}

function reset(){
  ship={x:W/2, y:H-58};
  bullets=[]; aBullets=[];
  score=0; lives=3; level=1;
  state='waiting';
  moveDir=1; moveTimer=0; dropPending=false;
  initAliens();
  updateUI();
}

function updateUI(){
  document.getElementById('sc').textContent=score;
  document.getElementById('bs').textContent=best;
  document.getElementById('lv').textContent='❤'.repeat(Math.max(0,lives));
  document.getElementById('lv2').textContent=level;
}

document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='Space'){
    e.preventDefault();
    if(state==='waiting'){state='playing';}
    else if(state==='playing') shoot();
    else if(state==='dead'||state==='win') reset();
  }
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; });
canvas.addEventListener('click',()=>{
  if(state==='waiting'){state='playing';}
  else if(state==='playing') shoot();
  else if(state==='dead'||state==='win') reset();
});

let lastShot=0;
function shoot(){
  if(Date.now()-lastShot<320)return;
  lastShot=Date.now();
  bullets.push({x:ship.x,y:ship.y-SHIP_RENDER_H/2});
}

let aShootTimer=0;
function alienShoot(){
  const alive=aliens.filter(a=>a.alive);
  if(!alive.length)return;
  const cols=[...new Set(alive.map(a=>a.col))];
  const col=cols[Math.floor(Math.random()*cols.length)];
  const bottom=alive.filter(a=>a.col===col).sort((a,b)=>b.row-a.row)[0];
  if(bottom) aBullets.push({x:bottom.x,y:bottom.y+ALIEN_H/2});
}

// stars array
const STARS=Array.from({length:70},(_,i)=>({
  x:(i*173+11)%W, y:(i*97+31)%H,
  s:i%4===0?2:1, b:0.3+Math.random()*0.6
}));

function drawBg(){
  ctx.fillStyle='#06061a';
  ctx.fillRect(0,0,W,H);
  STARS.forEach(s=>{
    ctx.fillStyle=`rgba(255,255,255,${s.b})`;
    ctx.fillRect(s.x,s.y,s.s,s.s);
  });
}

function drawAliens(){
  aliens.filter(a=>a.alive).forEach(a=>{
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(cityTints[a.tint], a.x-ALIEN_W/2, a.y-ALIEN_H/2, ALIEN_W, ALIEN_H);
  });
}

function drawShip(){
  const dh=SHIP_RENDER_H;
  const dw=Math.round(SHIP_RENDER_H*SHIP_RATIO);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(shipOff, ship.x-dw/2, ship.y-dh/2, dw, dh);
  // engine glow
  const t=Date.now()/120;
  ctx.fillStyle=`rgba(80,200,255,${0.35+Math.sin(t)*0.15})`;
  ctx.beginPath();
  ctx.ellipse(ship.x, ship.y+SHIP_RENDER_H/2+3, 7, 4, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawBullets(){
  bullets.forEach(b=>{
    const g=ctx.createLinearGradient(b.x,b.y-16,b.x,b.y);
    g.addColorStop(0,'#00ffee'); g.addColorStop(1,'rgba(0,255,200,0)');
    ctx.fillStyle=g; ctx.fillRect(b.x-2,b.y-16,4,16);
  });
  aBullets.forEach(b=>{
    const g=ctx.createLinearGradient(b.x,b.y,b.x,b.y+14);
    g.addColorStop(0,'#ff3366'); g.addColorStop(1,'rgba(255,50,100,0)');
    ctx.fillStyle=g; ctx.fillRect(b.x-2,b.y,4,14);
  });
}

function drawHUD(){
  ctx.textAlign='left';
  ctx.font='bold 15px monospace';
  ctx.fillStyle='#00ffaa';
  ctx.fillText('LEVEL '+level,14,22);
}

function drawOverlay(title,sub,col){
  ctx.fillStyle='rgba(0,0,20,0.7)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 36px monospace'; ctx.fillStyle=col||'#00ffaa';
  ctx.fillText(title,W/2,H/2-28);
  ctx.font='15px monospace'; ctx.fillStyle='#ccc';
  ctx.fillText(sub,W/2,H/2+12);
  ctx.font='13px monospace'; ctx.fillStyle='#FFD700';
  ctx.fillText('Rekord: '+best,W/2,H/2+40);
}

function update(){
  if(state!=='playing')return;

  // Ship movement
  if(keys['ArrowLeft']||keys['KeyA']) ship.x=Math.max(SHIP_RENDER_W/2, ship.x-SHIP_SPEED);
  if(keys['ArrowRight']||keys['KeyD']) ship.x=Math.min(W-SHIP_RENDER_W/2, ship.x+SHIP_SPEED);

  // Bullets
  bullets.forEach(b=>b.y-=BULLET_SPEED);
  bullets=bullets.filter(b=>b.y>-10);
  aBullets.forEach(b=>b.y+=ABSPEED);
  aBullets=aBullets.filter(b=>b.y<H+10);

  // Alien movement
  const alive=aliens.filter(a=>a.alive);
  if(!alive.length){ state='win'; return; }
  const interval=Math.max(6, 38 - level*5);
  moveTimer++;
  if(moveTimer>=interval){
    moveTimer=0;
    if(dropPending){
      alive.forEach(a=>a.y+=22);
      dropPending=false;
    } else {
      const lx=Math.min(...alive.map(a=>a.x));
      const rx=Math.max(...alive.map(a=>a.x));
      if(rx+ALIEN_W/2>=W-8&&moveDir===1){ moveDir=-1; dropPending=true; }
      else if(lx-ALIEN_W/2<=8&&moveDir===-1){ moveDir=1; dropPending=true; }
      else alive.forEach(a=>a.x+=moveDir*14);
    }
  }

  // Alien shooting
  const shootInterval=Math.max(40, 80-level*8);
  aShootTimer++;
  if(aShootTimer>=shootInterval){ aShootTimer=0; alienShoot(); }

  // Bullet ↔ alien collision
  bullets.forEach(b=>{
    aliens.filter(a=>a.alive).forEach(a=>{
      if(b.x>a.x-ALIEN_W/2&&b.x<a.x+ALIEN_W/2&&b.y>a.y-ALIEN_H/2&&b.y<a.y+ALIEN_H/2){
        a.alive=false; b.y=-999;
        score+=a.pts;
        if(score>best){ best=score; }
        updateUI();
        // small explosion flash
        ctx.fillStyle='rgba(255,220,0,0.6)';
        ctx.beginPath(); ctx.arc(a.x,a.y,18,0,Math.PI*2); ctx.fill();
      }
    });
  });

  // Alien bullet ↔ ship
  aBullets.forEach(b=>{
    const hw=Math.round(SHIP_RENDER_H*SHIP_RATIO)/2, hh=SHIP_RENDER_H/2;
    if(b.x>ship.x-hw&&b.x<ship.x+hw&&b.y>ship.y-hh&&b.y<ship.y+hh){
      b.y=H+999; lives--;
      updateUI();
      if(lives<=0) state='dead';
    }
  });

  // Aliens reach ground
  if(alive.some(a=>a.y+ALIEN_H/2>=H-65)) state='dead';
}

function loop(){
  drawBg();
  update();

  if(state==='win'){
    // show brief "next level" screen then continue
    ctx.fillStyle='rgba(0,0,20,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.textAlign='center'; ctx.font='bold 30px monospace'; ctx.fillStyle='#FFD700';
    ctx.fillText('LEVEL '+(level+1)+' KOMMT …',W/2,H/2);
    requestAnimationFrame(loop);
    setTimeout(()=>{
      level++; bullets=[]; aBullets=[];
      initAliens(); moveDir=1; moveTimer=0; dropPending=false;
      state='playing'; updateUI();
    },1400);
    return;
  }

  drawAliens();
  drawBullets();
  drawShip();
  drawHUD();

  if(state==='waiting') drawOverlay('PROSA INVADERS','LEERTASTE oder KLICK zum Starten','#00FFAA');
  else if(state==='dead') drawOverlay('GAME OVER','LEERTASTE oder KLICK zum Neustart','#FF3355');

  requestAnimationFrame(loop);
}

reset();
loop();
setTimeout(()=>{ document.getElementById('splash').style.display='none'; },3000);
</script>
