<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flappy Prosa</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#111;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    font-family:monospace;
    user-select:none;
  }
  #wrap { position:relative; }
  canvas {
    display:block;
    border-radius:14px;
    border:3px solid #333;
    cursor:pointer;
    image-rendering:pixelated;
  }
  #splash {
    position:absolute;
    inset:0;
    border-radius:11px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    pointer-events:none;
    z-index:10;
    animation: splashFull 2.4s ease forwards;
  }
  @keyframes splashFull {
    0%   { background:rgba(0,0,0,0);   opacity:0; }
    15%  { background:rgba(0,0,0,0.88);opacity:1; }
    70%  { background:rgba(0,0,0,0.88);opacity:1; }
    100% { background:rgba(0,0,0,0);   opacity:0; }
  }
  #splash-title {
    font-size:42px;
    font-weight:bold;
    color:#FFD700;
    letter-spacing:4px;
    opacity:0;
    transform:scale(0.5);
    animation:titlePop 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.35s forwards;
  }
  @keyframes titlePop { to { opacity:1; transform:scale(1); } }
  #splash-sub {
    font-size:14px;
    color:#aaa;
    margin-top:12px;
    opacity:0;
    animation:subFade 0.4s ease 1s forwards;
  }
  @keyframes subFade { to { opacity:1; } }
  #ui { display:flex; gap:3rem; margin-top:1rem; color:#777; font-size:14px; }
  #ui b { color:#FFD700; font-size:18px; }
  #hint { margin-top:.5rem; color:#555; font-size:12px; letter-spacing:.05em; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="400" height="580"></canvas>
  <div id="splash">
    <div id="splash-title">FLAPPY PROSA</div>
    <div id="splash-sub">Klick oder LEERTASTE zum Starten</div>
  </div>
</div>
<div id="ui">Punkte: <b id="sc">0</b> &nbsp;|&nbsp; Rekord: <b id="bs">0</b></div>
<div id="hint">LEERTASTE oder KLICK zum Fliegen</div>

<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
ctx.imageSmoothingEnabled=false;
const scEl=document.getElementById('sc'),bsEl=document.getElementById('bs');
const W=400,H=580,GRAV=0.45,FLAP=-8.5,PW=68,GAP=158,SPD=2.5,PINT=90;

let best=0;
try{best=parseInt(localStorage.getItem('flappyProsa')||'0');}catch(e){}
bsEl.textContent=best;

// ── Exact 23×27 pixel grid from reference image (pixel-perfect extraction) ──
const N=null;
const FACE_W=23,FACE_H=27;
const FACE=[
  [N,N,N,N,N,N,N,'#201d32','#1f1b2c','#1e1b2e','#1f1c2d','#201c2d','#1e1b2c','#1f1c2d','#231e32',N,N,N,N,N,N,N,N],
  [N,N,N,N,N,'#232033','#1f1c2d','#c8846d','#f0ae94','#efae90','#efac8f','#eeab91','#efae90','#eead91','#eead8f','#1f1d32','#232035',N,N,N,N,N,N],
  [N,N,N,N,'#201d32','#cb856c','#eeaf90','#efad93','#edac8e','#f0ad90','#f0ad90','#f0af93','#edac8e','#eead8f','#efad93','#eec8b1','#ecaa88','#242134',N,N,N,N,N],
  [N,N,N,'#201d30','#cb8770','#edb094','#f1b092','#eead8f','#efae90','#efae92','#efae92','#edac90','#f0af93','#eead8f','#eead8f','#efae92','#f1c8b2','#eeac8c','#211e2f',N,N,N,N],
  [N,N,'#232033','#c98b76','#e8a185','#e4a282','#f0b192','#eead8f','#eead8f','#efae90','#f0af93','#f0af93','#f0af91','#f0af91','#f0af93','#efae90','#ecac89','#efc1a9','#eeaf90','#232031',N,N,N],
  [N,N,'#1e1a2b','#e6a386','#e7a688','#e7a48a','#e3a284','#f0af93','#eead8f','#f1b094','#efae92','#efae92','#f0af93','#efae92','#f1b094','#f0af93','#efae92','#eead91','#f2c3a9','#201d30',N,N,N],
  [N,'#201d2e','#cd8a70','#e4a385','#e2a183','#e3a284','#e0a182','#f2b193','#f1b094','#efae92','#efae92','#efae92','#eeae92','#efae92','#f2b193','#f0af93','#efae90','#efae90','#eeb194','#f2c5ae','#211e2f',N,N],
  [N,'#211e31','#cb886d','#e3a284','#e4a385','#e3a284','#e3a286','#e3a284','#eeae92','#f0af91','#edac8e','#edac90','#efae90','#efae90','#efae92','#f0af93','#eead8f','#eead8f','#f0af93','#f0c2ab','#201d30',N,N],
  [N,'#211e2f','#cc896e','#e3a284','#e2a183','#e1a082','#e3a485','#e3a485','#efae90','#eead8f','#efae90','#eead8f','#eead8f','#efae90','#eead8f','#edac90','#edac8e','#efae90','#efae90','#efc1a9','#201d30',N,N],
  [N,'#201d30','#cb856b','#e3a284','#e3a387','#e2a185','#e2a183','#e2a183','#eead91','#edac90','#efae92','#eead8f','#eead91','#efae92','#efae92','#eead8f','#eeae92','#eeae93','#eeae92','#f1c3ac','#1f1b2c',N,N],
  [N,'#1f1c2f','#cb856c','#e4a387','#e3a286','#e2a183','#e2a183','#e3a284','#f0ae8e','#ecaf93','#6e5f58','#73645d','#6b6158','#71635a','#edac8e','#eeaf90','#efae90','#eeae92','#72655c','#6f625a','#232033',N,N],
  [N,'#211e31','#1e1b2c','#1d1a2b','#1e1b2e','#1e1b2e','#1d1c2c','#1e1b2e','#1f1c2d','#1b1829','#1f1e2e','#1d1a2b','#1e1b2c','#1f1c2d','#1e1b2e','#edb093','#eaaf91','#1e1b2e','#1e1d2f','#201c2d','#201d2e','#1c192c','#201d2e'],
  ['#1d1a2b','#f3b495','#efae92','#eead8f','#1d1a2d','#c4826c','#c68571','#c4826c','#1f1c2f','#1f1d2b','#c47d67','#c58674','#1e1b2e','#c07d6a','#1d1a2d','#212032','#201d30','#1d1a2d','#c1846f','#1c192c','#6e6158','#cdccca','#1f1d2b'],
  ['#1f1c2d','#f0b192','#c27f65','#edaa8d','#e9ac8f','#c78d77','#eeb195','#ecab8b','#d1987d','#1f1c2d','#ffffff','#fffffd','#201d30','#efaf93','#1e1b2e','#eead8d','#c98f79','#1e1b2e','#ffffff','#201d30','#70635a','#c8c6c7','#1d1b29'],
  ['#1e1b2e','#eead8f','#eead8f','#c07e66','#f0af93','#c68e77','#efac8f','#eead8f','#edac8e','#1f1c2d','#eead8f','#edae8f','#f0af93','#eba989','#211e31','#efaa89','#f2c8b0','#1d1a2b','#eeab8e','#eeb194','#71645b','#c6c5c1','#1f1c2d'],
  ['#1f1c2d','#efae90','#edad91','#c5836b','#eead91','#c78f78','#edac8e','#eead8f','#eeaf90','#ecac90','#1e1b2e','#221f30','#201d2e','#1e1c2a','#f0af91','#efaf93','#f3c5ae','#c4826a','#1d1a2b','#201d30','#1e1c2a','#1f1c2f',N],
  [N,'#1f1b2c','#eeae92','#edad91','#eeab90','#c89079','#c88f7b','#edac8e','#edac8e','#eead8f','#eead8f','#efae92','#efae90','#efad93','#efae90','#f0af93','#edb093','#edc3aa','#c7856d','#eeae92','#1d1b29',N,N],
  [N,N,'#1f1c2f','#1f1d2b','#201d30','#c68e77','#c68e77','#efae90','#eead8f','#efae92','#eead91','#eead91','#edac8e','#edac8e','#eead8d','#c5836d','#c5836b','#c4826a','#c27e67','#eead8f','#1f1c2d',N,N],
  [N,N,N,'#1e1b2e','#bb816d','#78665a','#c58d76','#c38c77','#eeae92','#f0b095','#bd7b65','#ecab8b','#efae90','#edae8f','#756357','#756359','#78665a','#eeaf90','#efae90','#f0af91','#1f1c2d',N,N],
  [N,N,N,N,'#1b192e','#73625a','#c58c79','#c68d79','#c68f7a','#c3836a','#f2b195','#79625a','#eeab90','#edad92','#eead91','#efae92','#efae92','#efac8f','#79655a','#f0af93','#211e31',N,N],
  [N,N,N,N,N,'#201d30','#c7907b','#c58e79','#c68d79','#c4907a','#f0b095','#edac8e','#be7a63','#c07f63','#bf7e68','#be7d69','#bf7d65','#bd7c66','#f0af91','#efb091','#1d1b29',N,N],
  [N,N,N,N,N,N,'#1e1b2e','#c58e79','#c38f7a','#c58e79','#c5917b','#edae8f','#f0af93','#eead8f','#f0af93','#edad94','#f1b094','#edac90','#f0ab8c','#c3917a','#211e2f',N,N],
  [N,N,N,N,N,N,N,'#1e1d2d','#c38f79','#c18e79','#c5917c','#efae92','#efae90','#eead8f','#c68e77','#73605a','#72615a','#edaa8f','#f0af93','#1d1c2a',N,N,N],
  [N,N,N,N,N,N,N,N,'#201d2e','#c3907b','#c09079','#c18d77','#eead91','#edac8e','#eead91','#eeae92','#ecaf92','#efb091','#c18d78','#1b1829',N,N,N],
  [N,N,N,N,N,N,N,N,N,'#211d2e','#76655d','#c3907d','#c18d78','#ecaa8a','#eeaf90','#edae8f','#efa98f','#c48b77','#242230',N,N,N,N],
  [N,N,N,N,N,N,N,N,N,N,'#201d30','#1e1b2c','#c1917b','#c28f7a','#77655b','#c58d76','#7d6b61','#76635c','#201d2e',N,N,N,N],
  [N,N,N,N,N,N,N,N,N,N,N,N,'#211e2f','#1c172b','#201d32','#201d30','#211e2f','#1e1a2b',N,N,N,N,N],
];

// Pre-render to offscreen canvas (1px per art pixel)
const fOff=document.createElement('canvas');
fOff.width=FACE_W; fOff.height=FACE_H;
const fCtx=fOff.getContext('2d');
fCtx.imageSmoothingEnabled=false;
for(let r=0;r<FACE_H;r++)
  for(let c=0;c<FACE_W;c++){
    const col=FACE[r]&&FACE[r][c];
    if(!col) continue;
    fCtx.fillStyle=col;
    fCtx.fillRect(c,r,1,1);
  }

// Draw face at correct aspect ratio (23:27 ≈ 0.85, close to original 0.82)
function drawFace(cx,cy,size,angle){
  const dh=size;
  const dw=size*(FACE_W/FACE_H);
  ctx.save();
  ctx.translate(cx,cy);
  ctx.rotate(angle*Math.PI/180);
  ctx.imageSmoothingEnabled=false;
  ctx.drawImage(fOff,-dw/2,-dh/2,dw,dh);
  ctx.restore();
}

// ── Game state ────────────────────────────────────────────────────
let bird,pipes,frame,score,state;
let clouds=[{x:60,y:55,r:24},{x:220,y:80,r:19},{x:340,y:42,r:30}];

function reset(){
  bird={x:90,y:H/2-40,vy:0,angle:0};
  pipes=[];frame=0;score=0;
  scEl.textContent='0';state='waiting';
}

function flap(){
  if(state==='waiting') state='playing';
  if(state==='playing') bird.vy=FLAP;
  if(state==='dead') reset();
}
canvas.addEventListener('click',flap);
document.addEventListener('keydown',e=>{if(e.code==='Space'){e.preventDefault();flap();}});

function drawSky(){
  const g=ctx.createLinearGradient(0,0,0,H-65);
  g.addColorStop(0,'#b8cad8');g.addColorStop(1,'#d8d8d8');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H-65);
}
function drawClouds(){
  ctx.fillStyle='rgba(255,255,255,0.72)';
  clouds.forEach(c=>{
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.arc(c.x+c.r*.8,c.y-c.r*.3,c.r*.7,0,Math.PI*2);
    ctx.arc(c.x+c.r*1.6,c.y,c.r*.55,0,Math.PI*2);
    ctx.fill();
  });
}
function drawConcrete(x,y,w,h){
  if(h<=0)return;
  const g=ctx.createLinearGradient(x,0,x+w,0);
  g.addColorStop(0,'#787878');g.addColorStop(.2,'#9c9c9c');
  g.addColorStop(.5,'#ababab');g.addColorStop(.8,'#979797');g.addColorStop(1,'#757575');
  ctx.fillStyle=g;ctx.fillRect(x,y,w,h);
  ctx.strokeStyle='rgba(0,0,0,0.04)';ctx.lineWidth=1;
  for(let ly=y+18;ly<y+h;ly+=18){ctx.beginPath();ctx.moveTo(x,ly);ctx.lineTo(x+w,ly);ctx.stroke();}
  ctx.fillStyle='rgba(255,255,255,0.10)';ctx.fillRect(x,y,3,h);
  ctx.fillStyle='rgba(0,0,0,0.14)';ctx.fillRect(x+w-3,y,3,h);
}
function drawPipe(p){
  const x=p.x,topH=p.topH,botY=p.topH+GAP,capH=20,ex=8;
  drawConcrete(x,0,PW,topH-capH);
  const cg=ctx.createLinearGradient(x-ex,0,x+PW+ex,0);
  cg.addColorStop(0,'#585858');cg.addColorStop(.5,'#828282');cg.addColorStop(1,'#585858');
  ctx.fillStyle=cg;ctx.fillRect(x-ex,topH-capH,PW+ex*2,capH);
  ctx.fillStyle='rgba(255,255,255,0.09)';ctx.fillRect(x-ex,topH-capH,PW+ex*2,4);
  ctx.fillStyle='rgba(0,0,0,0.28)';ctx.fillRect(x-ex,topH-3,PW+ex*2,3);
  ctx.fillStyle=cg;ctx.fillRect(x-ex,botY,PW+ex*2,capH);
  ctx.fillStyle='rgba(255,255,255,0.09)';ctx.fillRect(x-ex,botY,PW+ex*2,4);
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(x-ex,botY+capH-3,PW+ex*2,3);
  drawConcrete(x,botY+capH,PW,H-65-botY-capH);
}
function drawGround(){
  const g=ctx.createLinearGradient(0,H-65,0,H);
  g.addColorStop(0,'#606060');g.addColorStop(.08,'#888');g.addColorStop(1,'#6a6a6a');
  ctx.fillStyle=g;ctx.fillRect(0,H-65,W,65);
  ctx.fillStyle='rgba(255,255,255,0.07)';ctx.fillRect(0,H-65,W,3);
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.fillRect(0,H-65,W,2);
}
function drawScore(){
  ctx.textAlign='center';ctx.font='bold 30px monospace';
  ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=6;
  ctx.fillStyle='#fff';ctx.fillText(score,W/2,52);ctx.shadowBlur=0;
}
function drawOverlay(title,sub){
  ctx.fillStyle='rgba(0,0,0,0.52)';ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.font='bold 32px monospace';ctx.fillStyle='#FFD700';ctx.fillText(title,W/2,H/2-28);
  ctx.font='15px monospace';ctx.fillStyle='#fff';ctx.fillText(sub,W/2,H/2+10);
  if(state==='dead'){ctx.font='13px monospace';ctx.fillStyle='#FFD700';ctx.fillText('Rekord: '+best,W/2,H/2+38);}
}
function checkHit(){
  const bx=bird.x,by=bird.y,bw=16,bh=18;
  if(by+bh>H-65||by-bh<0)return true;
  for(let p of pipes)
    if(bx+bw>p.x+6&&bx-bw<p.x+PW-6&&(by-bh<p.topH||by+bh>p.topH+GAP))return true;
  return false;
}

function loop(){
  drawSky();
  clouds.forEach(c=>{if(state==='playing')c.x-=.35;if(c.x+90<0)c.x=W+50;});
  drawClouds();
  if(state==='playing'){
    frame++;
    bird.vy+=GRAV;bird.y+=bird.vy;
    bird.angle=Math.min(Math.max(bird.vy*3.5,-28),85);
    if(frame%PINT===0){
      const minH=70,maxH=H-65-GAP-70;
      pipes.push({x:W+10,topH:Math.floor(Math.random()*(maxH-minH))+minH,scored:false});
    }
    pipes.forEach(p=>p.x-=SPD);
    pipes=pipes.filter(p=>p.x+PW>-20);
    pipes.forEach(p=>{
      if(!p.scored&&p.x+PW<bird.x){
        p.scored=true;score++;scEl.textContent=score;
        if(score>best){best=score;bsEl.textContent=best;try{localStorage.setItem('flappyProsa',best);}catch(e){}}
      }
    });
    if(checkHit())state='dead';
  }
  pipes.forEach(drawPipe);
  drawGround();
  if(state!=='playing')bird.angle=0;
  drawFace(bird.x,bird.y,46,bird.angle);
  drawScore();
  if(state==='waiting')drawOverlay('FLAPPY PROSA','Klick oder LEERTASTE');
  else if(state==='dead')drawOverlay('GAME OVER','Klick zum Neustart');
  requestAnimationFrame(loop);
}
reset();loop();
setTimeout(()=>{document.getElementById('splash').style.display='none';},2600);
</script>
</body>
</html>
